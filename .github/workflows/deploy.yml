# Manual deploy to GitHub Pages.
#
# Nothing is published automatically: pushing commits does NOT deploy.
# To publish the current state of `main`, go to the repo's Actions tab,
# pick "Deploy to GitHub Pages", and press "Run workflow".
name: Deploy to GitHub Pages

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/configure-pages@v5
        with:
          # Auto-enables Pages (source: GitHub Actions) on first run.
          # If this step fails with a permissions error, enable it once by
          # hand: Settings → Pages → Source → "GitHub Actions".
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
